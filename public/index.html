<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- ── Preconnect: establish early TCP connections for LCP-critical origins ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.coingecko.com" crossorigin />
  <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin />
  <link rel="dns-prefetch" href="https://coin-images.coingecko.com" />

  <!-- ── Preload logo so Navbar image has fetchpriority=high in initial request ── -->
  <link rel="preload" as="image" href="/logo192.png" fetchpriority="high" />

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#8B5CF6" />
  <meta name="google-site-verification" content="77WIXUFsSwp5JBxNaoqdPEyuupjLTfF0vLWsPPkBjUA" />
  <meta name="google-site-verification" content="sOCWeSLNvodtZZuic-UkVMbj5R1di0HhhN2-Du0-aag" />

  <!-- Base title. Route-specific meta tags are managed by React Helmet. -->
  <title>CryptoCardiac - The Social Pulse of Crypto Communities</title>
  <meta data-rh="true" name="description"
    content="Vote for your favorite cryptocurrencies and explore real-time community rankings, charts, and educational crypto guides." />
  <meta data-rh="true" name="keywords"
    content="cryptocurrency, crypto voting, crypto rankings, bitcoin, ethereum, crypto education, blockchain" />
  <meta data-rh="true" name="author" content="CryptoCardiac" />

  <!-- Open Graph / Facebook. React Helmet replaces these on route render. -->
  <meta data-rh="true" property="og:type" content="website" />
  <meta data-rh="true" property="og:url" content="https://cryptocardiac.com/" />
  <meta data-rh="true" property="og:title" content="CryptoCardiac - The Social Pulse of Crypto Communities" />
  <meta data-rh="true" property="og:description"
    content="Vote for your favorite cryptocurrencies and explore real-time community rankings, charts, and educational crypto guides." />
  <meta data-rh="true" property="og:image" content="https://cryptocardiac.com/og-image-256x256.png" />

  <!-- Twitter. React Helmet replaces these on route render. -->
  <meta data-rh="true" name="twitter:card" content="summary_large_image" />
  <meta data-rh="true" name="twitter:url" content="https://cryptocardiac.com/" />
  <meta data-rh="true" name="twitter:title" content="CryptoCardiac - The Social Pulse of Crypto Communities" />
  <meta data-rh="true" name="twitter:description"
    content="Vote for your favorite cryptocurrencies and explore real-time community rankings, charts, and educational crypto guides." />
  <meta data-rh="true" name="twitter:image" content="https://cryptocardiac.com/og-image.jpg" />

  <!-- Google AdSense — async so it never blocks rendering -->
  <meta name="google-adsense-account" content="ca-pub-9515835463753888">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9515835463753888"
    crossorigin="anonymous"></script>

  <!-- ── Critical CSS: static hero shell renders with zero layout shift ── -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      background: #151520;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh
    }

    #root {
      min-height: 100vh
    }
  </style>
</head>

<body>
  <noscript>
    <style>
      .ns-wrap {
        font-family: system-ui, sans-serif;
        background: #151520;
        color: #fff;
        min-height: 100vh;
        padding: 40px 24px;
        max-width: 760px;
        margin: 0 auto;
      }

      .ns-wrap h1 {
        font-size: 2rem;
        font-weight: 800;
        color: #CE34EA;
        margin-bottom: 12px;
      }

      .ns-wrap p {
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.7;
        margin-bottom: 16px;
      }

      .ns-wrap a {
        color: #CE34EA;
        margin-right: 14px;
        line-height: 2;
      }
    </style>
    <div class="ns-wrap">
      <h1>CryptoCardiac</h1>
      <p>CryptoCardiac is a cryptocurrency community voting and education platform. The interactive site requires JavaScript for live voting, charts, account tools, and real-time data.</p>
      <p>Public education, policy, and contact pages remain available through the links below.</p>
      <p>
        <a href="https://cryptocardiac.com/featured-articles">Featured Articles</a>
        <a href="https://cryptocardiac.com/about">About</a>
        <a href="https://cryptocardiac.com/contact">Contact</a>
        <a href="https://cryptocardiac.com/privacy-policy">Privacy Policy</a>
        <a href="https://cryptocardiac.com/terms">Terms</a>
        <a href="https://cryptocardiac.com/disclaimer">Disclaimer</a>
      </p>
    </div>
  </noscript>

  <div id="root"></div>
</body>

</html>
