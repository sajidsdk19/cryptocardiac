<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- ── Preconnect: establish early TCP connections for LCP-critical origins ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.coingecko.com" crossorigin />
  <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin />
  <link rel="dns-prefetch" href="https://coin-images.coingecko.com" />

  <!-- ── Preload logo so Navbar image has fetchpriority=high in initial request ── -->
  <link rel="preload" as="image" href="/logo192.png" fetchpriority="high" />

  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#8B5CF6" />
  <meta name="google-site-verification" content="77WIXUFsSwp5JBxNaoqdPEyuupjLTfF0vLWsPPkBjUA" />

  <!-- Primary Meta Tags -->
  <title>CryptoCardiac — The Social Pulse of Crypto Communities</title>
  <meta name="title" content="CryptoCardiac — The Social Pulse of Crypto Communities" />
  <meta name="description"
    content="Vote for your favorite cryptocurrencies and explore real-time community rankings, charts, and analytics." />
  <meta name="keywords"
    content="cryptocurrency, crypto voting, crypto rankings, bitcoin, ethereum, crypto analytics, crypto community, blockchain" />
  <meta name="author" content="CryptoCardiac" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cryptocardiac.com/" />
  <meta property="og:title" content="CryptoCardiac — The Social Pulse of Crypto Communities" />
  <meta property="og:description"
    content="Vote for your favorite cryptocurrencies and explore real-time community rankings, charts, and analytics." />
  <meta property="og:image" content="https://cryptocardiac.com/og-image-256x256.png" />
  <meta property="og:image:width" content="256" />
  <meta property="og:image:height" content="256" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://cryptocardiac.com/" />
  <meta name="twitter:title" content="CryptoCardiac — The Social Pulse of Crypto Communities" />
  <meta name="twitter:description"
    content="Vote for your favorite cryptocurrencies and explore real-time community rankings, charts, and analytics." />
  <meta name="twitter:image" content="https://cryptocardiac.com/og-image.jpg" />

  <!-- Google AdSense — async so it never blocks rendering -->
  <meta name="google-adsense-account" content="ca-pub-3326984644187937">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3326984644187937"
    crossorigin="anonymous"></script>

  <!-- ── Critical CSS: static hero shell renders with zero layout shift ── -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      background: #151520;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh
    }

    #root {
      min-height: 100vh
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <div id="root"></div>
</body>

</html>
